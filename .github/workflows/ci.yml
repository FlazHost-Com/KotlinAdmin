name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  convention-check:
    name: Convention Check (Detekt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Upload Detekt Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: detekt-report
          path: build/reports/detekt/

  test:
    name: Tests (SQLite in-memory)
    runs-on: ubuntu-latest
    needs: convention-check

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run Tests
        run: ./gradlew test --info
        env:
          APP_MODE: "full"
          APP_NAME: "KotlinAdmin-CI"
          JWT_SECRET: "ci-test-jwt-secret-that-is-at-least-32-characters-long"
          SESSION_SECRET: "ci-test-session-secret-that-is-32"
          BCRYPT_ROUNDS: "4"
          DB_URL: "jdbc:sqlite::memory:"
          DB_DRIVER: "org.sqlite.JDBC"
          DB_USER: ""
          DB_PASSWORD: ""
          REDIS_HOST: "localhost"
          REDIS_PORT: "6379"

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/reports/cucumber/

  db-compat:
    name: DB Compatibility (MySQL + PostgreSQL)
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        include:
          - db: mysql
            image: mysql:8.0
            url: "jdbc:mysql://localhost:3306/kotlinadmin_test"
            driver: "com.mysql.cj.jdbc.Driver"
            user: root
            password: rootpass
            port: 3306
          - db: postgres
            image: postgres:16-alpine
            url: "jdbc:postgresql://localhost:5432/kotlinadmin_test"
            driver: "org.postgresql.Driver"
            user: postgres
            password: postgrespass
            port: 5432

    services:
      db:
        image: ${{ matrix.image }}
        env:
          MYSQL_ROOT_PASSWORD: ${{ matrix.db == 'mysql' && 'rootpass' || '' }}
          MYSQL_DATABASE: ${{ matrix.db == 'mysql' && 'kotlinadmin_test' || '' }}
          POSTGRES_PASSWORD: ${{ matrix.db == 'postgres' && 'postgrespass' || '' }}
          POSTGRES_DB: ${{ matrix.db == 'postgres' && 'kotlinadmin_test' || '' }}
        ports:
          - ${{ matrix.port }}:${{ matrix.port }}
        options: >-
          --health-cmd ${{ matrix.db == 'mysql' && '"mysqladmin ping"' || '"pg_isready"' }}
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run migration smoke test on ${{ matrix.db }}
        run: ./gradlew test -Dkotest.tags="smoke" --info
        env:
          APP_MODE: "full"
          JWT_SECRET: "ci-test-jwt-secret-that-is-at-least-32-characters-long"
          SESSION_SECRET: "ci-test-session-secret-that-is-32"
          BCRYPT_ROUNDS: "4"
          DB_URL: ${{ matrix.url }}
          DB_DRIVER: ${{ matrix.driver }}
          DB_USER: ${{ matrix.user }}
          DB_PASSWORD: ${{ matrix.password }}
          REDIS_HOST: "localhost"
          REDIS_PORT: "6379"
