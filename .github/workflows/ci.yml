name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  convention-check:
    name: Convention Check (Detekt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Upload Detekt Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: detekt-report
          path: build/reports/detekt/

  test:
    name: Tests (SQLite)
    runs-on: ubuntu-latest
    needs: convention-check

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run Tests
        run: ./gradlew test --info
        env:
          APP_MODE: "full"
          APP_NAME: "KotlinAdmin-CI"
          JWT_SECRET: "ci-test-jwt-secret-that-is-at-least-32-characters-long"
          SESSION_SECRET: "ci-test-session-secret-that-is-32"
          BCRYPT_ROUNDS: "4"
          # SQLite file (workspace CI selalu bersih). Jangan pakai ":memory:" — setiap
          # koneksi Exposed mendapat DB kosong sendiri, sehingga migrasi Flyway tak terlihat.
          DB_TYPE: "sqlite"
          DB_USER: ""
          DB_PASSWORD: ""
          REDIS_HOST: "localhost"
          REDIS_PORT: "6379"

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/reports/cucumber/

  db-compat:
    name: DB Compatibility (MySQL + PostgreSQL)
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        include:
          - db: mysql
            image: mysql:8.0
            type: mysql
            jdbc: "mysql://"
            user: root
            password: rootpass
            port: 3306
          - db: postgres
            image: postgres:16-alpine
            type: postgres
            jdbc: "postgresql://"
            user: postgres
            password: postgrespass
            port: 5432

    services:
      db:
        image: ${{ matrix.image }}
        env:
          MYSQL_ROOT_PASSWORD: ${{ matrix.db == 'mysql' && 'rootpass' || '' }}
          MYSQL_DATABASE: ${{ matrix.db == 'mysql' && 'kotlinadmin_test' || '' }}
          POSTGRES_PASSWORD: ${{ matrix.db == 'postgres' && 'postgrespass' || '' }}
          POSTGRES_DB: ${{ matrix.db == 'postgres' && 'kotlinadmin_test' || '' }}
        ports:
          - ${{ matrix.port }}:${{ matrix.port }}
        options: >-
          --health-cmd ${{ matrix.db == 'mysql' && '"mysqladmin ping"' || '"pg_isready"' }}
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # DB_TYPE (bukan DB_URL) supaya CI melewati jalur resolusi config yang sama
      # dengan deploy CapRover.
      - name: Run migration smoke test on ${{ matrix.db }}
        run: ./gradlew test --rerun -Dkotest.tags="smoke" --info
        env:
          APP_MODE: "full"
          JWT_SECRET: "ci-test-jwt-secret-that-is-at-least-32-characters-long"
          SESSION_SECRET: "ci-test-session-secret-that-is-32"
          BCRYPT_ROUNDS: "4"
          DB_TYPE: ${{ matrix.type }}
          DB_HOST: "127.0.0.1"
          DB_PORT: "${{ matrix.port }}"
          DB_DATABASE: kotlinadmin_test
          DB_USER: ${{ matrix.user }}
          DB_PASSWORD: ${{ matrix.password }}
          REDIS_HOST: "localhost"
          REDIS_PORT: "6379"

      # Penjaga anti hijau-palsu: job ini pernah lolos tanpa menjalankan satu test pun
      # (tag "smoke" belum terdaftar) dan tanpa menyentuh DB matrix (config test memaku
      # SQLite). Tegaskan bahwa smoke test benar-benar jalan DAN benar-benar menabrak
      # ${{ matrix.db }} — bukan SQLite.
      - name: Assert migrations really ran against ${{ matrix.db }}
        run: |
          report=build/test-results/test/TEST-com.kotlinadmin.smoke.SmokeTest.xml
          test -f "$report" || { echo "::error::SmokeTest tidak dieksekusi — filter tag rusak"; exit 1; }
          grep -q 'jdbc:${{ matrix.jdbc }}' "$report" \
            || { echo "::error::Smoke test tidak memakai ${{ matrix.db }} (kemungkinan jatuh ke SQLite)"; exit 1; }
          grep -q 'failures="0" errors="0"' "$report" \
            || { echo "::error::SmokeTest gagal pada ${{ matrix.db }}"; exit 1; }
          echo "OK — migrasi & smoke test terverifikasi jalan di ${{ matrix.db }}"
